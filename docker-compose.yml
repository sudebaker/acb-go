services:
  acb:
    container_name: acb-service
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    env_file: .env
    volumes:
      - acb-data:/var/lib/acb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:8090/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  acb-data: